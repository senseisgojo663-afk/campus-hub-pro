services:
  # ── Backend ──────────────────────────────────────────────
  - type: web
    name: campus-hub-pro-backend
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false          # fill this in the Render dashboard
      - key: CLIENT_URL
        sync: false          # fill with the frontend URL once deployed

  # ── Frontend ─────────────────────────────────────────────
  - type: web
    name: campus-hub-pro-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false          # fill with https://<backend-url>/api
